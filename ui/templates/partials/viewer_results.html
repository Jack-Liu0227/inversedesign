<div class="viewer-panel-head">
  <h3>Records</h3>
  <div class="viewer-actions">
    <span class="muted">{{ db }} / {{ table }} / {{ total }} rows / sort={{ sort_order }}</span>
    <button type="button" class="ghost-btn" onclick='batchDeleteSelected({{ db|tojson }}, {{ table|tojson }}, {{ record_key|tojson }})'>Batch Delete</button>
  </div>
</div>
<div class="viewer-list">
  {% for rec in records %}
  <div class="viewer-item">
    <div class="viewer-item-top">
      <label class="record-check-wrap">
        <input type="checkbox" class="record-check" value="{{ rec.key_val }}" />
        <span class="viewer-item-title">{{ rec.label_col }}: {{ rec.label }}</span>
      </label>
      <span class="viewer-item-key">{{ rec.key_col }}={{ rec.key_val }}</span>
    </div>
    <p class="viewer-item-preview">{{ rec.preview }}</p>
    <div class="viewer-item-meta">
      {% for mk, mv in rec.meta.items() %}
      <span>{{ mk }}: {{ mv }}</span>
      {% endfor %}
    </div>
    <button
      class="ghost-btn viewer-open-btn"
      hx-get="/partials/viewer-detail?db={{ db }}&table={{ table }}&key_col={{ rec.key_col }}&key_val={{ rec.key_val }}&doc_view={{ doc_view or 'chunk' }}"
      hx-target="#viewer-detail"
      hx-swap="innerHTML"
      type="button"
    >
      Open Detail
    </button>
  </div>
  {% else %}
  <div class="empty-state">No records match your filters.</div>
  {% endfor %}
</div>
